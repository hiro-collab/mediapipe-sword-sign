# MediaMTX sample configuration for multiple Windows USB webcams.
#
# Replace CAMERA_*_NAME with names from:
#
#   ffmpeg -list_devices true -f dshow -i dummy
#
# Start MediaMTX with this file:
#
#   mediamtx configs/mediamtx/mediamtx.windows.example.yml
#
# Browser WebRTC URLs:
#   http://127.0.0.1:8889/cam0
#   http://127.0.0.1:8889/cam1
#
# RTSP URLs for Python vision workers:
#   rtsp://127.0.0.1:8554/cam0
#   rtsp://127.0.0.1:8554/cam1

logLevel: info

rtsp: true
rtspAddress: :8554

hls: true
hlsAddress: :8888

webrtc: true
webrtcAddress: :8889
# Keep this local by default. Add your LAN origin explicitly only when needed.
webrtcAllowOrigins:
  - http://127.0.0.1:8889
  - http://localhost:8889

paths:
  cam0:
    runOnInit: ffmpeg -f dshow -video_size 640x480 -framerate 30 -i video="CAMERA_0_NAME" -c:v libx264 -pix_fmt yuv420p -preset ultrafast -tune zerolatency -b:v 800k -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes

  cam1:
    runOnInit: ffmpeg -f dshow -video_size 640x480 -framerate 30 -i video="CAMERA_1_NAME" -c:v libx264 -pix_fmt yuv420p -preset ultrafast -tune zerolatency -b:v 800k -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes

  cam2:
    runOnInit: ffmpeg -f dshow -video_size 640x480 -framerate 30 -i video="CAMERA_2_NAME" -c:v libx264 -pix_fmt yuv420p -preset ultrafast -tune zerolatency -b:v 800k -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes

  cam3:
    runOnInit: ffmpeg -f dshow -video_size 640x480 -framerate 30 -i video="CAMERA_3_NAME" -c:v libx264 -pix_fmt yuv420p -preset ultrafast -tune zerolatency -b:v 800k -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes

  cam4:
    runOnInit: ffmpeg -f dshow -video_size 640x480 -framerate 30 -i video="CAMERA_4_NAME" -c:v libx264 -pix_fmt yuv420p -preset ultrafast -tune zerolatency -b:v 800k -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes
